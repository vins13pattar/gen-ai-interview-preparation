name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prisma schema + FTS (matches local setup)
        run: pnpm exec prisma db push && pnpm exec tsx scripts/migrate-fts5.ts

      - name: Build
        run: pnpm build
